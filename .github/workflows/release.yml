name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ebpf:
    name: Build eBPF programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: ebpf-release

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Build eBPF programs (release)
        run: |
          cargo +nightly build \
            --package neurontrace-ebpf \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release

      - name: Upload eBPF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-programs
          path: target/bpfel-unknown-none/release/neurontrace-ebpf

  build-userspace:
    name: Build userspace (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: build-ebpf
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Download eBPF artifacts
        uses: actions/download-artifact@v4
        with:
          name: ebpf-programs
          path: target/bpfel-unknown-none/release/

      - name: Build userspace binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --package neurontrace --release --target ${{ matrix.target }}

      - name: Package release
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/neurontrace dist/
          cp -r policies dist/
          cp README.md LICENSE dist/ 2>/dev/null || true
          cd dist && tar czf ../neurontrace-${{ matrix.target }}.tar.gz .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: neurontrace-${{ matrix.target }}
          path: neurontrace-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-userspace
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/neurontrace-x86_64-unknown-linux-gnu/neurontrace-x86_64-unknown-linux-gnu.tar.gz
            artifacts/neurontrace-aarch64-unknown-linux-gnu/neurontrace-aarch64-unknown-linux-gnu.tar.gz

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="core-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="trace-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Outer hexagonal shield (kernel boundary) -->
  <polygon points="256,32 448,128 448,320 256,416 64,320 64,128"
           fill="none" stroke="url(#ring-grad)" stroke-width="6" stroke-linejoin="round" opacity="0.6"/>

  <!-- Inner hexagonal shield -->
  <polygon points="256,72 408,148 408,300 256,376 104,300 104,148"
           fill="none" stroke="url(#ring-grad)" stroke-width="3" stroke-linejoin="round" opacity="0.3"/>

  <!-- Neural network nodes (neuron representation) -->
  <!-- Central node -->
  <circle cx="256" cy="224" r="28" fill="url(#core-grad)"/>

  <!-- Layer 1 nodes -->
  <circle cx="176" cy="168" r="14" fill="url(#trace-grad)"/>
  <circle cx="336" cy="168" r="14" fill="url(#trace-grad)"/>
  <circle cx="176" cy="280" r="14" fill="url(#trace-grad)"/>
  <circle cx="336" cy="280" r="14" fill="url(#trace-grad)"/>

  <!-- Layer 2 nodes (outer) -->
  <circle cx="128" cy="224" r="10" fill="url(#ring-grad)" opacity="0.7"/>
  <circle cx="384" cy="224" r="10" fill="url(#ring-grad)" opacity="0.7"/>
  <circle cx="256" cy="136" r="10" fill="url(#ring-grad)" opacity="0.7"/>
  <circle cx="256" cy="312" r="10" fill="url(#ring-grad)" opacity="0.7"/>

  <!-- Synaptic connections (traces) -->
  <line x1="256" y1="224" x2="176" y2="168" stroke="url(#trace-grad)" stroke-width="2.5" opacity="0.7"/>
  <line x1="256" y1="224" x2="336" y2="168" stroke="url(#trace-grad)" stroke-width="2.5" opacity="0.7"/>
  <line x1="256" y1="224" x2="176" y2="280" stroke="url(#trace-grad)" stroke-width="2.5" opacity="0.7"/>
  <line x1="256" y1="224" x2="336" y2="280" stroke="url(#trace-grad)" stroke-width="2.5" opacity="0.7"/>

  <line x1="176" y1="168" x2="128" y2="224" stroke="url(#ring-grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="176" y1="168" x2="256" y2="136" stroke="url(#ring-grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="336" y1="168" x2="384" y2="224" stroke="url(#ring-grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="336" y1="168" x2="256" y2="136" stroke="url(#ring-grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="176" y1="280" x2="128" y2="224" stroke="url(#ring-grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="176" y1="280" x2="256" y2="312" stroke="url(#ring-grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="336" y1="280" x2="384" y2="224" stroke="url(#ring-grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="336" y1="280" x2="256" y2="312" stroke="url(#ring-grad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Lock icon in center node (security) -->
  <rect x="248" y="220" width="16" height="12" rx="2" fill="white" opacity="0.9"/>
  <path d="M252,220 v-4 a4,4 0 0,1 8,0 v4" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>

  <!-- Pulse traces (activity signals) -->
  <circle cx="206" cy="190" r="3" fill="#10b981" opacity="0.8"/>
  <circle cx="306" cy="190" r="3" fill="#10b981" opacity="0.8"/>
  <circle cx="206" cy="258" r="3" fill="#10b981" opacity="0.8"/>
  <circle cx="306" cy="258" r="3" fill="#10b981" opacity="0.8"/>

  <!-- Block indicator dashes on shield edges -->
  <line x1="100" y1="152" x2="112" y2="158" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="400" y1="152" x2="412" y2="158" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="100" y1="296" x2="112" y2="290" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="400" y1="296" x2="412" y2="290" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#e2e8f0" letter-spacing="-1">
    NeuronTrace
  </text>
  <text x="256" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#94a3b8" letter-spacing="3">
    KERNEL CONTAINMENT
  </text>
</svg>
